name: smt_host_app
description: SMT Desktop Host Controller - Flutter desktop app for serial communication
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Serial communication
  flutter_libserialport: ^0.4.0
  
  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.2.0
  
  # Data modeling
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  
  # Navigation
  go_router: ^12.1.0
  
  # Charts & visualization
  fl_chart: ^0.65.0
  
  # UI utilities
  cupertino_icons: ^1.0.6
  
  # Logging
  logger: ^2.0.2
  
  # Utils
  collection: ^1.18.0
  intl: ^0.18.1
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  
  # Enable desktop support
  # Linux and Windows are enabled by default in Flutter 3.10+

# Fingerprint for build verification
# Linux: flutter build linux
# Windows: flutter build windows
# Run: flutter run -d linux / -d windows
