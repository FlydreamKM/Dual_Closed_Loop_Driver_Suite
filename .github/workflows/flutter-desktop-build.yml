name: Build Flutter Desktop & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      release:
        description: 'Trigger release build'
        required: false
        default: false
        type: boolean

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build Linux Release
        working-directory: ./flutter_host
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter create --platforms=linux .
          flutter build linux --release

      - name: Package Linux build
        run: |
          tar -czf flutter_host_linux.tar.gz -C flutter_host/build/linux/x64/release bundle

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter_host_linux
          path: flutter_host_linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Build Windows Release
        working-directory: ./flutter_host
        run: |
          flutter config --enable-windows-desktop
          flutter pub get
          flutter create --platforms=windows .
          flutter build windows --release

      - name: Package Windows build
        run: |
          Compress-Archive -Path flutter_host\build\windows\x64\runner\Release\* -DestinationPath flutter_host_windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter_host_windows
          path: flutter_host_windows.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release == 'true'
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter_host_linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter_host_windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flutter_host_linux.tar.gz
            flutter_host_windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
